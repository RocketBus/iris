name: Deploy Platform

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build CLI wheel and update dist
        run: |
          pip install build
          python -m build --wheel
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "CLI version: $VERSION"
          cp dist/iris-${VERSION}-py3-none-any.whl platform/public/dist/
          echo "$VERSION" > platform/public/dist/latest.txt
          # Remove old wheels
          find platform/public/dist/ -name 'iris-*.whl' ! -name "iris-${VERSION}-*" -delete
          ls -la platform/public/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H sunshineapp.ai >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env.local' \
            --exclude '.env.production' \
            --exclude '.git' \
            --exclude 'out' \
            --exclude 'supabase/.branches' \
            --exclude 'supabase/.temp' \
            platform/ ubuntu@sunshineapp.ai:/opt/iris-platform/

      - name: Build and deploy
        env:
          BUILD_VERSION: ${{ github.sha }}
        run: |
          SHORT_SHA=${BUILD_VERSION:0:7}
          ssh ubuntu@sunshineapp.ai "cd /opt/iris-platform && NEXT_PUBLIC_BUILD_VERSION=$SHORT_SHA docker compose build --no-cache && NEXT_PUBLIC_BUILD_VERSION=$SHORT_SHA docker compose up -d"
          ssh ubuntu@sunshineapp.ai << 'EOF'
            sleep 5
            curl -sf http://localhost:3001/api/health && echo ' Health check OK' || echo ' Health check FAILED'
          EOF

      - name: Verify deployment
        run: |
          sleep 3
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://iris.clickbus.com/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Deployment successful — https://iris.clickbus.com"
          else
            echo "Warning: health check returned $STATUS (Caddy/DNS may need time)"
          fi
