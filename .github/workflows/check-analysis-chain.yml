name: Analysis Chain

on:
  push:
    branches: [main]
    paths:
      - 'iris/analysis/**'
      - 'iris/metrics/aggregator.py'
      - 'scripts/check_analysis_chain.py'
      - '.github/workflows/check-analysis-chain.yml'
  pull_request:
    paths:
      - 'iris/analysis/**'
      - 'iris/metrics/aggregator.py'
      - 'scripts/check_analysis_chain.py'
      - '.github/workflows/check-analysis-chain.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Check analysis chain
        run: python scripts/check_analysis_chain.py
