name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build wheel and create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
        id: version

      - name: Build wheel + sdist
        run: python -m build

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Install: \`curl -fsSL https://iris.clickbus.com/install.sh | sh\`

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
            dist/*.whl dist/*.tar.gz
